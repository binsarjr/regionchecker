apiVersion: v1
kind: ConfigMap
metadata:
  name: regionchecker-config
  namespace: regionchecker
data:
  config.yaml: |
    listen: ":8080"
    cache_dir: "/var/cache/regionchecker"
    log_level: "info"
    source: "nro"
    sources:
      nro: "https://ftp.ripe.net/pub/stats/ripencc/nro-stats/latest/nro-delegated-stats"
    http:
      read_timeout: "10s"
      write_timeout: "15s"
      idle_timeout: "60s"
    update:
      conditional_get: true
      retry_attempts: 3
      retry_backoff: "30s"
