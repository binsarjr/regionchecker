version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - gosec
    - revive
    - unconvert
    - unparam
    - gocritic
    - ineffassign
    - misspell
    - prealloc
    - nilerr
    - nolintlint
    - govet
    - staticcheck

  settings:
    gosec:
      excludes:
        - G104
    govet:
      enable-all: true

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
          - unparam

formatters:
  enable:
    - gofmt
    - goimports
