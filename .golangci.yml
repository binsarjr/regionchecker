version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - gosec
    - revive
    - unconvert
    - unparam
    - gocritic
    - ineffassign
    - misspell
    - prealloc
    - nilerr
    - nolintlint
    - govet
    - staticcheck

  settings:
    gosec:
      excludes:
        # G104 unhandled errors — errcheck covers this.
        - G104
        # G204 subprocess with variable — bootstrap runs trusted child.
        - G204
        # G306 WriteFile perms — test seed writer.
        - G306
        # G404 weak rand — bench uses math/rand/v2 intentionally.
        - G404
        # G115 integer overflow — bit-packing uint32 to [4]byte is safe.
        - G115
        # G703 path traversal — CLI paths come from flags (trusted).
        - G703
    govet:
      enable-all: true
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - (*net.TCPConn).Close
        - (*crypto/tls.Conn).Close
        - (*net/http.Response).Body.Close
        - (encoding/csv.Writer).Flush

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
          - unparam
      - path: cmd/regionchecker/main\.go
        # main uses defer stop() + os.Exit; gocritic flags it but it's intentional.
        linters:
          - gocritic

formatters:
  enable:
    - gofmt
    - goimports
