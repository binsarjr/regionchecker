version: 2
project_name: regionchecker

before:
  hooks:
    - go mod tidy
    - go mod download

builds:
  - id: regionchecker
    main: ./cmd/regionchecker
    binary: regionchecker
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.buildDate={{.Date}}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE*
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

sboms:
  - artifacts: archive

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Performance
      regexp: '^.*?perf(\(.+\))??!?:.+$'
      order: 2
    - title: Other
      order: 999
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - 'merge conflict'
      - Merge pull request
      - Merge remote-tracking branch

dockers:
  - image_templates:
      - "ghcr.io/binsarjr/regionchecker:{{ .Version }}-amd64"
      - "ghcr.io/binsarjr/regionchecker:latest-amd64"
    dockerfile: Dockerfile
    use: buildx
    goos: linux
    goarch: amd64
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.source=https://github.com/binsarjr/regionchecker"
      - "--build-arg=VERSION={{.Version}}"
      - "--build-arg=COMMIT={{.FullCommit}}"
      - "--build-arg=BUILD_DATE={{.Date}}"
  - image_templates:
      - "ghcr.io/binsarjr/regionchecker:{{ .Version }}-arm64"
      - "ghcr.io/binsarjr/regionchecker:latest-arm64"
    dockerfile: Dockerfile
    use: buildx
    goos: linux
    goarch: arm64
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.source=https://github.com/binsarjr/regionchecker"
      - "--build-arg=VERSION={{.Version}}"
      - "--build-arg=COMMIT={{.FullCommit}}"
      - "--build-arg=BUILD_DATE={{.Date}}"

docker_manifests:
  - name_template: "ghcr.io/binsarjr/regionchecker:{{ .Version }}"
    image_templates:
      - "ghcr.io/binsarjr/regionchecker:{{ .Version }}-amd64"
      - "ghcr.io/binsarjr/regionchecker:{{ .Version }}-arm64"
  - name_template: "ghcr.io/binsarjr/regionchecker:latest"
    image_templates:
      - "ghcr.io/binsarjr/regionchecker:latest-amd64"
      - "ghcr.io/binsarjr/regionchecker:latest-arm64"

release:
  github:
    owner: binsarjr
    name: regionchecker
  draft: false
  prerelease: auto
